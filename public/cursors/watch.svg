<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Classic Mac OS wristwatch wait cursor -->
  <!-- Band top -->
  <rect x="11" y="2" width="10" height="3" fill="black"/>
  <rect x="12" y="5" width="8" height="2" fill="black"/>
  <!-- Watch face outline -->
  <rect x="9" y="7" width="14" height="14" rx="2" fill="black"/>
  <!-- Watch face inner -->
  <rect x="11" y="9" width="10" height="10" fill="white"/>
  <!-- Clock hands - hour (pointing to 3) -->
  <rect x="16" y="13" width="4" height="2" fill="black"/>
  <!-- Clock hands - minute (pointing to 12) -->
  <rect x="15" y="9" width="2" height="5" fill="black"/>
  <!-- Center dot -->
  <rect x="15" y="13" width="2" height="2" fill="black"/>
  <!-- Band bottom -->
  <rect x="12" y="21" width="8" height="2" fill="black"/>
  <rect x="11" y="23" width="10" height="3" fill="black"/>
</svg>
